<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Scheduling Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <h1>CPU Scheduling Simulator</h1>
        
        <div class="input-section">
            <label>Number of Processes: </label>
            <input type="number" id="processCount" value="3" min="1">
            <button onclick="createInputs()">Create Table</button>
        </div>

        <div id="dynamicInputs"></div>

        <div id="controls" class="hidden">
            <label>Select Algorithm: </label>
            <select id="algorithm" onchange="checkAlgorithm()">
                <option value="FCFS">FCFS</option>
                <option value="SJF">SJF (Non-Preemptive)</option>
                <option value="Priority">Priority (Non-Preemptive)</option>
                <option value="RR">Round Robin</option>
            </select>

            <span id="quantumDiv" class="hidden">
                <label>Time Quantum: </label>
                <input type="number" id="quantum" value="2" min="1">
            </span>

            <button class="run-btn" onclick="startSimulation()">Run Algorithm</button>
        </div>

        <div id="outputSection" class="hidden">
            <h2>Result Table</h2>
            <div id="tableContainer"></div>
            
            <div id="averages"></div>

            <h2>Gantt Chart</h2>
            <div id="ganttChart"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
